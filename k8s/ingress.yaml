apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anime-ingress
  namespace: anime
  annotations:
    # Use nginx class assuming standard ingress-nginx setup in homelab
    kubernetes.io/ingress.class: "nginx"
    # Route matching regex
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Strip the /api/ prefix before sending the request to the backend server
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    # Optional: Set this to your local domain if you have one, e.g., anime.homelab.local
    # - host: your-domain.com
    #   http:
    - http:
        paths:
          # Route all /api/* traffic to the server service
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: server-service
                port:
                  number: 80
          # Route all other root-level traffic to the client service
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client-service
                port:
                  number: 80
